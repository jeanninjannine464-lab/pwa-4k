<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="4K GAME">
    <link rel="manifest">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const channelId = params.get('channel_id') || '10001';
            const manifestName = channelId === '10001' ? 'manifest.json' : `${channelId}.json`;
            const manifestLinkEl = document.querySelector('link[rel="manifest"]');
            if (manifestLinkEl) {
                manifestLinkEl.href = new URL(`./${manifestName}`, window.location.href).toString();
                console.log('index early manifest href:', manifestLinkEl.href);
            }
        })();
    </script>
    <link rel="apple-touch-icon" href="./icons/favicon-192x192.png">
    <title>Redirecting...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .loading {
            text-align: center;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Redirecting to install page...</p>
    </div>

    <script>
        console.log("=== index.html auto redirect ===");
        console.log("Current URL:", window.location.href);
        console.log("User Agent:", navigator.userAgent);

        function isIOSDevice() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
        }

        const params = window.location.search;
        const urlParams = new URLSearchParams(params);
        const channelId = urlParams.get("channel_id") || "10001";
        const manifestLinkEl = document.querySelector('link[rel="manifest"]');
        console.log("URL params:", params);

        function applyManifestLink() {
            if (!manifestLinkEl) return;
            const manifestName = channelId === "10001" ? "manifest.json" : `${channelId}.json`;
            manifestLinkEl.href = new URL(`./${manifestName}`, window.location.href).toString();
            console.log("index manifest href:", manifestLinkEl.href);
        }

        applyManifestLink();

        if (isIOSDevice()) {
            const guideUrl = new URL("./ios-guide.html", window.location.href);
            urlParams.forEach((value, key) => guideUrl.searchParams.set(key, value));
            guideUrl.searchParams.set("return_url", window.location.href);
            const targetUrl = guideUrl.toString();
            console.log("Detected iOS device, redirecting to:", targetUrl);
            window.location.href = targetUrl;
        } else {
            const targetUrl = "./install.html" + params;
            console.log("Non-iOS device, redirecting to:", targetUrl);
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
